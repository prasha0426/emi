<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loan Calculator</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #4facfe, #00f2fe);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}
.container {
    background: white;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    width: 350px;
}
h2 {
    text-align: center;
    margin-bottom: 20px;
}
label {
    font-size: 14px;
}
input, select {
    width: 100%;
    padding: 10px;
    margin: 8px 0 15px;
    border-radius: 6px;
    border: 1px solid #ccc;
}
button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    background: #4facfe;
    border: none;
    border-radius: 8px;
    color: white;
    cursor: pointer;
}
button:hover {
    background: #00c6ff;
}
.result-box {
    margin-top: 15px;
    padding: 12px;
    background: #f1f9ff;
    border-left: 4px solid #4facfe;
}
</style>

</head>

<body>

<div class="container">
    <h2>Loan Calculator</h2>

```
<label>Loan Amount</label>
<input type="number" id="amount">

<label>Interest Rate (%)</label>
<input type="number" id="rate">

<label>Rate Type</label>
<select id="rateType">
    <option value="yearly">Yearly</option>
    <option value="monthly">Monthly</option>
</select>

<label>Time (Months)</label>
<input type="number" id="time">

<button onclick="calculateSummary()">Calculate</button>
<button onclick="downloadExcel()">Download Excel</button>

<div id="result" class="result-box"></div>
```

</div>

<script>
function roundToTens(num) {
    return Math.round(num / 10) * 10;
}

function calculateSummary() {
    let P = parseFloat(document.getElementById("amount").value);
    let rate = parseFloat(document.getElementById("rate").value);
    let time = parseInt(document.getElementById("time").value);
    let rateType = document.getElementById("rateType").value;

    if (!P || !rate || !time) {
        document.getElementById("result").innerHTML = "⚠️ Fill all fields";
        return;
    }

    let r = (rateType === "yearly") ? (rate / 12) / 100 : rate / 100;

    let principalPerMonth = roundToTens(P / time);
    let fixedInterest = roundToTens(P * r);
    let totalPerMonth = roundToTens(principalPerMonth + fixedInterest);

    let totalPayment = totalPerMonth * time;
    let totalInterest = fixedInterest * time;

    document.getElementById("result").innerHTML = `
        <b>Monthly Payment:</b> ₹ ${totalPerMonth}<br>
        <b>Total Payment:</b> ₹ ${roundToTens(totalPayment)}<br>
        <b>Total Interest:</b> ₹ ${roundToTens(totalInterest)}
    `;
}

function downloadExcel() {
    let P = parseFloat(document.getElementById("amount").value);
    let rate = parseFloat(document.getElementById("rate").value);
    let time = parseInt(document.getElementById("time").value);
    let rateType = document.getElementById("rateType").value;

    if (!P || !rate || !time) {
        alert("Fill all fields!");
        return;
    }

    let r = (rateType === "yearly") ? (rate / 12) / 100 : rate / 100;

    let principalPerMonth = roundToTens(P / time);
    let fixedInterest = roundToTens(P * r);
    let total = roundToTens(principalPerMonth + fixedInterest);

    let balance = P;

    let data = [];

    // Header
    data.push(["SHREE SELF HELP GROUP"]);
    data.push(["Loan Installment Details"]);
    data.push([]);

    data.push(["Account No.:"]);
    data.push(["Member's Name :"]);
    data.push(["Loan Amount (Mode):", roundToTens(P)]);
    data.push(["Date :"]);
    data.push([]);

    // Table header
    data.push([
        "Months",
        "Installments",
        "Interest",
        "Loan Outstanding",
        "TOTAL",
        "Date",
        "Authority Sign."
    ]);

    // Opening balance
    data.push(["", "", "", roundToTens(P), "", "", ""]);

    // Rows
    for (let i = 1; i <= time; i++) {
        balance = roundToTens(balance - principalPerMonth);

        data.push([
            i,
            principalPerMonth,
            fixedInterest,
            balance < 0 ? 0 : balance,
            total,
            "",
            ""
        ]);
    }

    // Footer
    data.push([]);
    data.push([
        "SHREE SELF HELP GROUP",
        "",
        "",
        "",
        "",
        "Loan Applicant Signature"
    ]);

    const ws = XLSX.utils.aoa_to_sheet(data);

    ws["!cols"] = [
        { wch: 8 },
        { wch: 14 },
        { wch: 10 },
        { wch: 18 },
        { wch: 10 },
        { wch: 12 },
        { wch: 18 }
    ];

    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Loan Sheet");

    XLSX.writeFile(wb, "Loan_Installment_Details.xlsx");
}
</script>

</body>
</html>
